<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOGUM the game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <div id="titulo">
        <img src="assets/logo.png" alt="ECOGUM" id="logoImg" />
        <span id="theGame">The Game</span>
    </div>
    <canvas id="juegoCanvas" width="400" height="500"></canvas>

    <!-- Overlay de Game Over / Leaderboard -->
    <div id="overlay" class="oculto">
        <div id="panelGameOver">
            <h2>GAME OVER</h2>
            <p id="puntuacionFinal"></p>
            <div id="formNombre">
                <input type="text" id="inputNombre" maxlength="16" placeholder="Tu nombre (máx. 16 letras)" autocomplete="off" />
                <button id="btnGuardar">💾 Guardar puntuación</button>
            </div>
            <div id="ranking" class="oculto">
                <h3>🏆 Top Mundial</h3>
                <ol id="listaRanking"></ol>
            </div>
            <button id="btnReiniciar">▶ Jugar de nuevo</button>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</body>
</html>
